<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>

    <div class="background-video">

    </div>
    <!-- Header -->
    <header class="header">
        <h1>To do List</h1>
    </header>

    <main class="app">

        <!-- Sidebar -->
        <aside class="sidebar">

            <button id="add-project">+ New Project</button>

            <nav class="project-list">

                <!-- Dynamic Projects -->
                <div id="project-container">
                    <!-- Project buttons/cards inserted here -->
                </div>

            </nav>

        </aside>

        <!-- Main Content -->
        <section class="content">

            <!-- Current Project -->
            <header class="content-header">

                <div>
                    <h2 id="project-title">Select Project</h2>
                    <p id="project-description">
                        to add your tasks
                    </p>
                </div>

                <button id="add-task">
                    + Add Task
                </button>

            </header>

            <!-- Task List -->
            <div id="task-container">

                <!--
                <div class="task-card">
                    <h3>Study OOP</h3>
                    <p>Finish prototype lesson.</p>
                    <p>Due: 2026-07-20</p>
                    <span class="priority high">High</span>
                </div>
                -->

            </div>

        </section>

    </main>

    <!-- ========================= -->
    <!-- Task Dialog -->
    <!-- ========================= -->

    <dialog id="task-dialog">

        <form id="task-form">

            <p>New Task</p>

            <input
                id="title"
                type="text"
                placeholder="Task title"
                required
            >

            <input
                id="description"
                type="text"
                placeholder="Description"
            ></input>

            <input
                id="due-date"
                type="date"
            >

            <select id="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <div class="buttons">
                <button id="save-task" type="submit">
                    Save
                </button>

                <button
                    id="cancel-task"
                    type="button"
                >
                    Cancel
                </button>
            </div>

        </form>

    </dialog>
  
    <!-- ========================= -->
    <!-- Project Dialog -->
    <!-- ========================= -->

    <dialog id="project-dialog">

        <form id="project-form">

            <p class="project-para">New Project</p>

            <input
                id="project-name"
                type="text"
                placeholder="Project name"
                required
            >

            <input
                id="project-description-input"
                type="text"
                placeholder="Description"
            >

            <input
                id="project-color"
                type="color"
                value="#4f46e5"
            >

            <div class="buttons">

                <button
                    id="save-project"
                    type="submit"
                >
                    Create
                </button>

                <button
                    id="cancel-project"
                    type="button"
                >
                    Cancel
                </button>

            </div>

        </form>

    </dialog>

</body>
</html>
